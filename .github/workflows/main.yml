name: Core-Auth CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    # ── Spec Section 5: Environment Spawn ──
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: core_auth_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL:           postgresql://postgres:postgres@localhost/core_auth_db
      REDIS_HOST:             localhost
      REDIS_PORT:             "6379"
      ACCESS_TOKEN_SECRET:    ${{ secrets.ACCESS_TOKEN_SECRET }}
      REFRESH_TOKEN_SECRET:   ${{ secrets.REFRESH_TOKEN_SECRET }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # ── Spec Section 5: DB Table Initialize ──
      - name: Initialize PostgreSQL Table
        run: psql $DATABASE_URL -f init_db.sql

      # ── Spec Section 5: Linter Engine ──
      - name: Linter — flake8
        run: |
          pip install flake8
          flake8 app/ --max-line-length=120 --ignore=E501,W503

      # ── Spec Section 5: Static Security Audit (SAST) ──
      - name: Security Scan — Bandit SAST
        run: |
          pip install bandit
          bandit -r app/ -ll --exclude app/__pycache__,app/routers/__pycache__

      # ── Spec Section 5: Async Test Suites ──
      - name: Run Async Integration Tests
        run: |
          pip install pytest pytest-asyncio httpx anyio
          pytest tests/ -v --asyncio-mode=auto
